\<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>personality test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">

  <a class="back" href="home.html">← back</a>
  <h1>personality test</h1>
  <p class="sub">answer these qns and we will tell ur personality</p>

  <div id="area"></div>

  <div class="hist" id="hist" style="display:none">
    <div class="hlbl">
      past results
      <button id="clr">clear</button>
    </div>
    <div class="hlist" id="hlist"></div>
  </div>

</div>
<script>
const qs = [
  { q: "ur ideal friday night is", opts: [
    ["big party loud music", 0],
    ["small hangout with close friends", 1],
    ["watching something at home alone", 2],
    ["doing something creative solo", 3]
  ]},
  { q: "when something goes wrong u", opts: [
    ["tell someone immediately", 0],
    ["think through it quietly first", 1],
    ["distract urself", 2],
    ["make a plan to fix it", 3]
  ]},
  { q: "ur fav type of convo is", opts: [
    ["chaotic silly random", 0],
    ["deep life stuff", 1],
    ["gossip and tea", 2],
    ["ideas and theories", 3]
  ]},
  { q: "how u make decisions", opts: [
    ["gut feeling always", 0],
    ["ask everyone around u", 1],
    ["pros and cons list", 2],
    ["just go with the vibes", 3]
  ]},
  { q: "ppl who know u would say ur", opts: [
    ["the loud one", 0],
    ["the quiet listener", 1],
    ["the funny one", 2],
    ["the weird one (compliment)", 3]
  ]}
];

const types = [
  { v: 0, e: "🔥", lbl: "the main character",  dsc: "everything happens around u and u love it that way", bg: "#fef2f2", tc: "#7f1d1d" },
  { v: 1, e: "🌙", lbl: "the deep thinker",     dsc: "u feel everything hard and think even harder",        bg: "#eef0f5", tc: "#1e3a5f" },
  { v: 2, e: "😂", lbl: "the comedian",          dsc: "ur coping mechanism is jokes and honestly it works",  bg: "#fefce8", tc: "#78350f" },
  { v: 3, e: "🪐", lbl: "the mysterious one",    dsc: "nobody fully gets u and thats exactly how u like it", bg: "#f0fdf4", tc: "#14532d" }
];

let cur = 0, answers = [], chosen = null;

function getRes() {
  const counts = [0, 0, 0, 0];
  answers.forEach(v => counts[v]++);
  return types[counts.indexOf(Math.max(...counts))];
}

function saveHist(lbl) {
  let h = JSON.parse(localStorage.getItem("personality_history") || "[]");
  h.unshift({ result: lbl, date: new Date().toLocaleDateString("en-GB", { day: "2-digit", month: "short" }) });
  if (h.length > 5) h = h.slice(0, 5);
  localStorage.setItem("personality_history", JSON.stringify(h));
}

function showHist() {
  const h = JSON.parse(localStorage.getItem("personality_history") || "[]");
  const sec = document.getElementById("hist");
  const list = document.getElementById("hlist");
  if (!h.length) { sec.style.display = "none"; return; }
  sec.style.display = "block";
  list.innerHTML = h.map(x => `<div class="hi"><span>${x.result}</span><small>${x.date}</small></div>`).join("");
}

function renderQ() {
  const d = document.getElementById("area");
  const q = qs[cur];
  d.innerHTML = `
    <p class="prog">q ${cur + 1} of ${qs.length}</p>
    <div class="bar"><div class="fill" style="width:${(cur / qs.length) * 100}%"></div></div>
    <p class="q">${q.q}</p>
    <div class="opts">${q.opts.map(o => `<button class="opt" data-v="${o[1]}">${o[0]}</button>`).join("")}</div>
    <button class="nxt" id="nxt">${cur === qs.length - 1 ? "see result →" : "next →"}</button>`;

  chosen = null;
  d.querySelectorAll(".opt").forEach(b => {
    b.addEventListener("click", () => {
      d.querySelectorAll(".opt").forEach(x => x.classList.remove("on"));
      b.classList.add("on");
      chosen = parseInt(b.dataset.v);
      document.getElementById("nxt").style.display = "inline-block";
    });
  });
  document.getElementById("nxt").addEventListener("click", () => {
    if (chosen === null) return;
    answers.push(chosen);
    cur++;
    cur < qs.length ? renderQ() : thinking();
  });
}

function thinking() {
  const d = document.getElementById("area");
  const dots = ["thinking .", "thinking ..", "thinking ..."];
  let i = 0;
  d.innerHTML = `<p class="think" id="t">thinking .</p>`;
  const iv = setInterval(() => { i = (i + 1) % 3; const el = document.getElementById("t"); if (el) el.textContent = dots[i]; }, 450);
  setTimeout(() => { clearInterval(iv); showRes(); }, 1800);
}

function showRes() {
  const r = getRes();
  saveHist(r.lbl);
  const d = document.getElementById("area");
  d.innerHTML = `
    <div class="res">
      <div class="emoji">${r.e}</div>
      <span class="badge" style="background:${r.bg};color:${r.tc}">${r.lbl}</span>
      <p class="lbl">${r.lbl}</p>
      <p class="dsc">${r.dsc}</p>
      <div class="btns">
        <button id="again">try again</button>
        <a class="btn" href="home.html">other test</a>
      </div>
    </div>`;
  document.getElementById("again").onclick = () => { cur = 0; answers = []; chosen = null; renderQ(); };
  showHist();
}

document.getElementById("clr").addEventListener("click", () => {
  localStorage.removeItem("personality_history");
  showHist();
});


renderQ();
</script>
</body>
</html>
